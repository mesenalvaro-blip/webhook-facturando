services:
  - type: web
    name: effort-sparring
    runtime: python
    rootDir: effort-sparring
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: DATABASE_URL
        fromDatabase:
          name: effort-sparring-db
          property: connectionString

databases:
  - name: effort-sparring-db
    plan: free
    region: oregon
